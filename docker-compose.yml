services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shahd-postgres
    environment:
      POSTGRES_USER: shahd
      POSTGRES_PASSWORD: shahd
      POSTGRES_DB: shahd
    ports:
      - "5432:5432"
    volumes:
      - shahd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shahd"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  shahd_pgdata:
